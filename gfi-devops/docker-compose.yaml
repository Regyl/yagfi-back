services:
  postgres:
    image: 'postgres:15.3'
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: 'idk_user'
      POSTGRES_PASSWORD: 'SomeUselessPassword02'
      POSTGRES_DB: 'uj'
  cdxgen-0:
    image: ghcr.io/cyclonedx/cdxgen:v11.11.0
    container_name: cdxgen-0
    ports:
      - '9090:9090'
    environment:
      CDXGEN_DEBUG_MODE: "debug"
    command: >
      cdxgen
      --no-babel
      --server
      --server-host 0.0.0.0
      --server-port 9090
  cdxgen-1:
    image: ghcr.io/cyclonedx/cdxgen:v11.11.0
    container_name: cdxgen-1
    ports:
      - '9091:9091'
    environment:
      CDXGEN_DEBUG_MODE: "debug"
    command: >
      cdxgen
      --no-babel
      --server
      --server-host 0.0.0.0
      --server-port 9091
  cdxgen-2:
    image: ghcr.io/cyclonedx/cdxgen:v11.11.0
    container_name: cdxgen-2
    ports:
      - '9092:9092'
    environment:
      CDXGEN_DEBUG_MODE: "debug"
    command: >
      cdxgen
      --no-babel
      --server
      --server-host 0.0.0.0
      --server-port 9092
  cdxgen-3:
    image: ghcr.io/cyclonedx/cdxgen:v11.11.0
    container_name: cdxgen-3
    ports:
      - '9093:9093'
    environment:
      CDXGEN_DEBUG_MODE: "debug"
    command: >
      cdxgen
      --no-babel
      --server
      --server-host 0.0.0.0
      --server-port 9093
  cdxgen-4:
    image: ghcr.io/cyclonedx/cdxgen:v11.11.0
    container_name: cdxgen-4
    ports:
      - '9094:9094'
    environment:
      CDXGEN_DEBUG_MODE: "debug"
    command: >
      cdxgen
      --no-babel
      --server
      --server-host 0.0.0.0
      --server-port 9094
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - '9095:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-data:
